<script>
document.addEventListener("DOMContentLoaded", function () {

  const sheetId = "19ezLkVYItTEMmK27XQcpZ5FNCa2EjYbZImb6Fsz3yt0";
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

  const container = document.getElementById("cards");
  const contador = document.getElementById("contador");

  if (!container) {
    console.error("Elemento #cards não encontrado no HTML.");
    return;
  }

  fetch(url)
    .then(res => res.text())
    .then(text => {

      const jsonText = text.match(
        /google\.visualization\.Query\.setResponse\((.*)\);/s
      )[1];

      const json = JSON.parse(jsonText);
      const rows = json.table.rows;

      let faltando = 0;

      rows.forEach(r => {

        const volume = r.c[0]?.v;
        const tenho = r.c[1]?.v === true;

        if (!volume) return;

        if (!tenho) faltando++;

        const card = document.createElement("div");
        card.className = `card ${tenho ? "tenho" : "faltando"}`;

        card.innerHTML = `
          <h2>Vol. ${volume}</h2>
          <input type="checkbox" ${tenho ? "checked" : ""} disabled>
        `;

        container.appendChild(card);
      });

      contador.textContent = `Faltam ${faltando} volumes`;

    })
    .catch(err => {
      console.error("Erro ao carregar planilha:", err);
      contador.textContent = "Erro ao carregar dados.";
    });

});
</script>
